name: Auto Sync

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Fork
        uses: actions/checkout@v3
        with:
          ref: master
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Fetch Upstream Default Branch
        run: |
          git remote add upstream https://github.com/MeteorDevelopment/meteor-client.git
          UPSTREAM_BRANCH=$(git ls-remote --heads upstream | grep 'refs/heads/' | head -n 1 | sed 's?.*refs/heads/??')
          echo "Upstream branch is $UPSTREAM_BRANCH"
          git fetch upstream $UPSTREAM_BRANCH  # Fetch the correct branch from upstream
          git branch -r  # List remote branches for verification

      - name: Check Fork Status
        id: check
        run: |
          UPSTREAM=$(git rev-parse upstream/$UPSTREAM_BRANCH)
          FORK=$(git rev-parse origin/master)  # Replace 'master' if your default branch is different

          if [ "$UPSTREAM" != "$FORK" ]; then
            echo "Fork is behind upstream."
            echo "::set-output name=behind::true"
          else
            echo "Fork is up to date."
            echo "::set-output name=behind::false"
          fi

      - name: Merge and Push
        if: steps.check.outputs.behind == 'true'
        run: |
          git merge upstream/$UPSTREAM_BRANCH
          git push origin master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
